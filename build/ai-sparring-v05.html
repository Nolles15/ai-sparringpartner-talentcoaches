<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hanzehogeschool Groningen AI Sparringpartner voor Talentcoaches</title>
  <style>
    :root {
      --bg: #f5f4f9;
      --ink: #2E276C;
      --muted: #5a5480;
      --panel: #ffffff;
      --line: #d8d5e8;
      --field: #efeef7;
      --accent: #ED7C00;
      --accent-dark: #2E276C;
      --accent-light: #fde8cc;
      --teal: #0089a8;
      --teal-light: #cceef5;
      --mint: #66d4a1;
      --mint-light: #d4f5e7;
      --mint-dark: #0d5c3a;
      --yellow: #fef3c7;
      --yellow-dark: #92400e;
      --red: #fee2e2;
      --red-dark: #991b1b;
      --shadow: 0 4px 24px rgba(46,39,108,0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(135deg, #ece9f7 0%, #f5f4f9 55%, #e8f6fa 100%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Aptos", sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    button, select, textarea, input { font: inherit; }
    .shell { width: min(1100px, calc(100% - 24px)); margin: 0 auto; padding: 20px 0 48px; }
    header {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 20px 0 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 4px;
    }
    .eyebrow { margin: 0 0 6px; color: var(--teal); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    h1 { margin: 0; font-size: clamp(1.6rem, 4vw, 3rem); line-height: 1.1; }
    .header-tools { display: flex; justify-content: flex-end; }
    .options-menu { position: relative; }
    .options-toggle {
      display: inline-grid; gap: 4px; width: 44px; min-height: 44px;
      padding: 10px 9px; border: 1px solid var(--line); border-radius: 10px;
      background: rgba(255,255,255,0.9); cursor: pointer; box-shadow: var(--shadow);
    }
    .options-toggle span { display: block; height: 2px; background: var(--ink); border-radius: 999px; }
    .options-toggle::-webkit-details-marker { display: none; }
    .options-panel {
      position: absolute; right: 0; top: calc(100% + 8px); width: min(360px, 90vw);
      padding: 16px; background: #fff; border: 1px solid var(--line);
      border-radius: 12px; box-shadow: var(--shadow); z-index: 20;
    }
    .options-panel h3 { margin: 0 0 10px; }
    .source-item { border-bottom: 1px solid var(--line); padding: 10px 0; }
    .source-item:last-child { border-bottom: 0; }
    .source-item strong { display: block; font-size: 0.9rem; }
    .source-item small { color: var(--muted); font-size: 0.8rem; }
    nav {
      display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0;
    }
    nav button {
      border: 1px solid var(--line); background: var(--panel); color: var(--ink);
      border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 0.92rem;
      transition: background 0.15s, border-color 0.15s;
    }
    nav button[aria-pressed="true"] { background: var(--accent-dark); border-color: var(--accent-dark); color: white; }
    nav button[data-view="demo"] { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
    nav button[data-view="demo"][aria-pressed="true"] { background: #c46600; border-color: #c46600; color: white; }
    .stage { background: rgba(255,255,255,0.88); border: 1px solid var(--line); border-radius: 12px; min-height: 560px; overflow: hidden; box-shadow: var(--shadow); }
    .view { display: none; padding: 24px; }
    .view.active { display: block; }
    h2 { margin: 0 0 10px; font-size: clamp(1.3rem, 2.5vw, 1.9rem); line-height: 1.1; }
    h3 { margin: 0 0 8px; font-size: 1rem; }
    p { margin: 0 0 12px; color: var(--muted); }
    p.dark { color: var(--ink); }
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 700;
      margin-right: 6px; margin-bottom: 4px;
    }
    .tag-blue { background: var(--teal-light); color: var(--teal); }
    .tag-green { background: var(--mint-light); color: var(--mint-dark); }
    .tag-yellow { background: var(--yellow); color: var(--yellow-dark); }
    .tag-red { background: var(--red); color: var(--red-dark); }

    /* Challenge page */
    .challenge-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; margin: 18px 0; }
    .challenge-card { background: var(--field); border-radius: 10px; padding: 16px; }
    .challenge-card h3 { color: var(--teal); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .challenge-card ul { margin: 0; padding-left: 16px; }
    .challenge-card li { color: var(--ink); font-size: 0.93rem; margin-bottom: 4px; }
    .persona-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
    .persona { background: var(--teal-light); border-radius: 10px; padding: 12px 16px; flex: 1 1 160px; }
    .persona strong { display: block; font-size: 0.95rem; color: var(--teal); }
    .persona span { font-size: 0.82rem; color: var(--muted); }

    /* Chat demo */
    .chat-layout { display: grid; grid-template-columns: minmax(0,1fr) 280px; gap: 18px; }
    .chat-main { display: flex; flex-direction: column; gap: 12px; }
    .scenario-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .scenario-btn {
      border: 1px solid var(--line); background: var(--panel); color: var(--ink);
      border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 0.86rem;
    }
    .scenario-btn.active { background: var(--accent-light); border-color: var(--accent); color: #7a3800; font-weight: 700; }
    .chat-window {
      background: var(--field); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; display: flex; flex-direction: column; gap: 14px;
      min-height: 260px; max-height: 520px; overflow-y: auto;
      scroll-behavior: smooth;
    }
    .bubble-coach, .bubble-ai {
      max-width: 88%; padding: 12px 14px; border-radius: 12px; font-size: 0.93rem; line-height: 1.5;
    }
    .bubble-coach {
      background: var(--accent-dark); color: white; align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .bubble-ai {
      background: white; border: 1px solid var(--line); align-self: flex-start;
      border-bottom-left-radius: 3px; color: var(--ink);
    }
    .bubble-ai-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .bubble-ai p { color: var(--ink); margin: 0 0 8px; }
    .bubble-ai p:last-child { margin-bottom: 0; }
    .bubble-ai .disclaimer {
      margin-top: 10px; padding: 8px 10px; background: var(--yellow); border-radius: 7px;
      font-size: 0.8rem; color: var(--yellow-dark);
    }
    .bubble-ai .followup {
      margin-top: 10px; padding: 8px 10px; background: var(--teal-light); border-radius: 7px;
      font-size: 0.82rem; color: var(--teal);
    }
    .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-input-row textarea {
      flex: 1; border: 1px solid var(--line); border-radius: 10px;
      background: white; color: var(--ink); padding: 10px 12px;
      resize: none; min-height: 64px;
    }
    .chat-input-row .send-btn {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      padding: 10px 18px; cursor: pointer; font-weight: 700; align-self: flex-end;
    }
    .reply-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .reply-btn {
      border: 1px solid var(--accent); background: var(--accent-light); color: #7a3800;
      border-radius: 20px; padding: 8px 16px; cursor: pointer; font-size: 0.88rem;
      transition: background 0.15s;
    }
    .reply-btn:hover { background: var(--accent); color: white; }
    .reset-btn {
      border: 1px solid var(--line); background: var(--field); color: var(--muted);
      border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 0.82rem;
    }
    .voice-row { display: flex; gap: 8px; }
    .voice-btn {
      border: 1px solid var(--line); background: var(--field); border-radius: 8px;
      padding: 7px 14px; cursor: not-allowed; color: var(--muted); font-size: 0.82rem;
    }
    .chat-sidebar { display: flex; flex-direction: column; gap: 12px; }
    .evidence-panel {
      background: var(--field); border: 1px solid var(--line); border-radius: 12px; padding: 14px;
    }
    .evidence-panel h3 { font-size: 0.88rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .evidence-item {
      border-bottom: 1px solid var(--line); padding: 8px 0; font-size: 0.82rem; color: var(--ink); line-height: 1.45;
    }
    .evidence-item:last-child { border-bottom: 0; }

    /* Assumptions */
    .assumption-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin: 16px 0; }
    .assumption-card {
      border: 1px solid var(--line); border-radius: 10px; padding: 14px; background: white;
    }
    .assumption-card h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .assumption-list { list-style: none; padding: 0; margin: 0; }
    .assumption-list li { padding: 6px 0; border-bottom: 1px solid var(--field); font-size: 0.9rem; }
    .assumption-list li:last-child { border-bottom: 0; }
    .assumption-list li::before { content: "→ "; color: var(--teal); font-weight: 700; }

    /* Risks */
    .risk-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin: 16px 0; }
    .risk-card { border-left: 4px solid var(--teal); border-radius: 0 10px 10px 0; padding: 14px; background: white; }
    .risk-card.red { border-color: #dc2626; }
    .risk-card.yellow { border-color: var(--accent); }
    .risk-card.blue { border-color: var(--teal); }
    .risk-card h3 { font-size: 0.9rem; margin-bottom: 6px; }
    .risk-list { list-style: none; padding: 0; margin: 0; font-size: 0.88rem; color: var(--muted); }
    .risk-list li { padding: 4px 0; }

    /* Next steps */
    .roadmap { display: grid; gap: 12px; counter-reset: step; }
    .roadmap article {
      position: relative; padding: 14px 14px 14px 52px;
      border: 1px solid var(--line); border-radius: 10px; background: white;
    }
    .roadmap article::before {
      counter-increment: step; content: counter(step);
      position: absolute; left: 12px; top: 14px;
      width: 28px; height: 28px; display: grid; place-items: center;
      border-radius: 999px; background: var(--mint-light);
      color: var(--mint-dark); font-weight: 800;
    }
    .roadmap article h3 { color: var(--accent-dark); }

    /* Feedback */
    .feedback-section { background: var(--field); border-radius: 12px; padding: 20px; margin-top: 20px; }
    .feedback-section h3 { margin-bottom: 12px; }
    .feedback-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .feedback-row button {
      border: 1px solid var(--line); background: white; border-radius: 8px;
      padding: 8px 16px; cursor: pointer;
    }
    .feedback-row button.selected { background: var(--mint-light); border-color: var(--mint); color: var(--mint-dark); font-weight: 700; }
    .feedback-note { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: white; padding: 10px; resize: vertical; min-height: 72px; }
    .feedback-status { min-height: 22px; color: var(--teal); font-weight: 700; margin-top: 8px; }

    /* Mock watermark */
    .mock-badge {
      display: inline-block; background: var(--yellow); color: var(--yellow-dark);
      font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 999px;
      margin-left: 8px; vertical-align: middle;
    }

    @media (max-width: 750px) {
      .chat-layout { grid-template-columns: 1fr; }
      .chat-sidebar { order: -1; }
      .challenge-grid, .assumption-grid, .risk-grid { grid-template-columns: 1fr; }
      header { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow" id="eyebrow"></p>
        <h1 id="title"></h1>
      </div>
      <div class="header-tools">
        <details class="options-menu">
          <summary class="options-toggle" aria-label="Opties en bronnen">
            <span></span><span></span><span></span>
          </summary>
          <div class="options-panel">
            <h3>Bronnen</h3>
            <p>Gegenereerd vanuit een workshopcanvas. Inhoud is gemockt — alle responsen zijn voorbeelden, geen live AI-uitvoer.</p>
            <div id="source-list"></div>
          </div>
        </details>
      </div>
    </header>

    <nav aria-label="Prototype-onderdelen">
      <button type="button" data-view="challenge" aria-pressed="true">Uitdaging</button>
      <button type="button" data-view="assumptions" aria-pressed="false">Aannames</button>
      <button type="button" data-view="demo" aria-pressed="false">Interactieve Demo</button>
      <button type="button" data-view="risks" aria-pressed="false">Wat kan er misgaan?</button>
      <button type="button" data-view="next" aria-pressed="false">Next Steps</button>
    </nav>

    <section class="stage">
      <section class="view active" id="challenge"></section>
      <section class="view" id="assumptions"></section>
      <section class="view" id="demo"></section>
      <section class="view" id="risks"></section>
      <section class="view" id="next"></section>
    </section>
  </main>

          <div class="persona"><strong>Opleidingscoach</strong><span>Weinig tijd voor literatuur, wil concrete handvatten</span></div>
        </div>
      `;
    }

    // ---- Aannames ----
    function renderAssumptions() {
      const assumptions = items("kritischeAannames");
      const quality = items("datakwaliteit");
      const sources = items("databronnen");
      const product = items("productDienst");
      el("assumptions").innerHTML = `
        <h2>Aannames <span class="mock-badge">te toetsen</span></h2>
        <p>Dit zijn de aannames waarop het prototype rust. Ze moeten worden gevalideerd voordat er een functionele app wordt gebouwd.</p>
        <div class="assumption-grid">
          <div class="assumption-card">
            <h3>Kritische aannames</h3>
            ${assumptions.length ? `<ul class="assumption-list">${assumptions.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : "<p>Zie canvas.</p>"}
          </div>
          <div class="assumption-card">
            <h3>Kennislaag & databronnen</h3>
            ${sources.length ? `<ul class="assumption-list">${sources.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : "<p>Zie canvas.</p>"}
          </div>
          <div class="assumption-card">
            <h3>Datakwaliteit & scope</h3>
            ${quality.length ? `<ul class="assumption-list">${quality.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : "<p>Zie canvas.</p>"}
          </div>
          <div class="assumption-card">
            <h3>Productvorm</h3>
            ${product.length ? `<ul class="assumption-list">${product.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : "<p>Chatinterface op smartphone en laptop.</p>"}
          </div>
        </div>
      `;
    }

    // ---- Chat Demo ----
    function activeScenario() {
      return model.chatScenarios.find(s => s.id === state.scenario) || model.chatScenarios[0];
    }

    function paras(text) {
      return text.split("\n\n").filter(Boolean).map(p => `<p>${esc(p)}</p>`).join("");
    }

    function renderDemo() {
      const sc = activeScenario();
      if (!sc) { el("demo").innerHTML = "<p>Geen scenario's beschikbaar.</p>"; return; }

      const chosenReply = state.coachReply && sc.coachReplies
        ? sc.coachReplies.find(r => r.label === state.coachReply) : null;

      const replyButtons = sc.coachReplies ? sc.coachReplies.map(r =>
        `<button class="reply-btn" data-reply="${esc(r.label)}">${esc(r.label)}</button>`
      ).join("") : "";

      el("demo").innerHTML = `
        <h2>Interactieve Demo <span class="mock-badge">gemockt</span></h2>
        <p>Kies een coachingscenario. Beantwoord de vervolgvraag van de AI om het tweede deel van het antwoord te zien.</p>
        <div class="scenario-bar">
          ${model.chatScenarios.map(s =>
            `<button class="scenario-btn${s.id===state.scenario?" active":""}" data-scenario="${s.id}">${esc(s.label)}</button>`
          ).join("")}
        </div>
        <div class="chat-layout">
          <div class="chat-main">
            <div class="chat-window" id="chat-window">

              <!-- Coach vraag -->
              <div style="align-self:flex-end">
                <div class="bubble-coach">${esc(sc.question)}</div>
              </div>

              <!-- Eerste AI antwoord -->
              <div style="align-self:flex-start; max-width:90%">
                <div class="bubble-ai-label">AI Sparringpartner</div>
                <div class="bubble-ai">${paras(sc.firstResponse)}</div>
              </div>

              ${replyButtons ? `
              <!-- Coach keuze knoppen -->
              <div style="align-self:flex-end; max-width:90%">
                ${chosenReply
                  ? `<div class="bubble-coach">${esc(chosenReply.label)}</div>`
                  : `<div class="reply-row">${replyButtons}</div>`
                }
              </div>` : ""}

              ${chosenReply ? `
              <!-- Tweede AI antwoord -->
              <div style="align-self:flex-start; max-width:90%">
                <div class="bubble-ai-label">AI Sparringpartner</div>
                <div class="bubble-ai">
                  ${paras(chosenReply.response)}
                  <div class="disclaimer">⚠️ ${esc(sc.disclaimer)}</div>
                </div>
              </div>` : ""}

            </div>

            ${chosenReply ? `
            <div style="margin-top:8px">
              <button class="reset-btn" id="reset-btn">↩ Andere keuze maken</button>
            </div>` : ""}

            <div class="voice-row" style="margin-top:10px">
              <button class="voice-btn" disabled title="Beschikbaar in Fase 2">🎤 Spraak invoer (fase 2)</button>
              <button class="voice-btn" disabled title="Beschikbaar in Fase 2">🔊 Voorlezen (fase 2)</button>
            </div>
          </div>
          <div class="chat-sidebar">
            <div class="evidence-panel">
              <h3>Bronnen achter dit antwoord</h3>
              ${sc.evidence.map(e => `<div class="evidence-item">${esc(e)}</div>`).join("")}
            </div>
            <div class="evidence-panel">
              <h3>Hoe werkt de demo?</h3>
              <p style="font-size:0.82rem">Dit is een <strong>gemockte</strong> interactie. Klik een antwoord om het tweede deel van het gesprek te zien. Een live versie reageert op vrije invoer via een taalmodel.</p>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll(".scenario-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.scenario = btn.dataset.scenario;
          state.coachReply = null;
          renderDemo();
        });
      });
      document.querySelectorAll(".reply-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.coachReply = btn.dataset.reply;
          renderDemo();
          setTimeout(() => {
            const win = document.getElementById("chat-window");
            if (win) win.scrollTop = win.scrollHeight;
          }, 50);
        });
      });
      const resetBtn = document.getElementById("reset-btn");
      if (resetBtn) resetBtn.addEventListener("click", () => { state.coachReply = null; renderDemo(); });
    }

    // ---- Wat kan er misgaan? ----
    function renderRisks() {
      const privacy = items("ethiekPrivacy");
      const value = items("waardecreatie");
      el("risks").innerHTML = `
        <h2>Wat kan er misgaan?</h2>
        <p>Dit zijn de belangrijkste risico's en aandachtspunten voor de coach, de sporter en de organisatie.</p>
        <div class="risk-grid">
          <div class="risk-card red">
            <h3>Hallucinatie & onjuist advies</h3>
            <ul class="risk-list">
              <li>AI kan zelfverzekerd klinken ook als het antwoord onjuist is</li>
              <li>Coaches kunnen onjuiste informatie overnemen zonder te controleren</li>
              <li>Mitigatie: kennislaag afgebakend, onzekerheid expliciet benoemd in output</li>
            </ul>
          </div>
          <div class="risk-card yellow">
            <h3>Privacy & persoonsgegevens</h3>
            ${privacy.length ? `<ul class="risk-list">${privacy.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : `
            <ul class="risk-list">
              <li>Coaches kunnen namen of gevoelige gegevens invoeren</li>
              <li>Vereist AVG-conformiteit van het hostingplatform</li>
              <li>DPO-toets noodzakelijk vóór pilot</li>
            </ul>`}
          </div>
          <div class="risk-card yellow">
            <h3>Bias voor vrouwen & jongeren</h3>
            <ul class="risk-list">
              <li>Sportwetenschap is sterk gericht op mannelijke volwassen topsporters</li>
              <li>Bevindingen zijn niet altijd overdraagbaar naar meisjes &lt;18 jaar</li>
              <li>Mitigatie: kennislaag annoteert per bron op doelgroep</li>
            </ul>
          </div>
          <div class="risk-card blue">
            <h3>Over-afhankelijkheid coach</h3>
            <ul class="risk-list">
              <li>Coach kan eigen oordeel te snel vervangen door AI-advies</li>
              <li>Principe P-01: coach blijft altijd beslisser — afdwingbaar via prompt</li>
              <li>Evaluatie pilot let op dit gedrag</li>
            </ul>
          </div>
          <div class="risk-card blue">
            <h3>Adoptie & compliance</h3>
            <ul class="risk-list">
              <li>Coaches moeten vertrouwen hebben in het systeem om het te gebruiken</li>
              <li>Eerste pilots bepalen of de tool de gewenste gesprekskwaliteit heeft</li>
              <li>Spraakondersteuning is cruciaal voor gebruik op locatie</li>
            </ul>
          </div>
          <div class="risk-card red">
            <h3>Waardecreatie onzeker</h3>
            ${value.length ? `<ul class="risk-list">${value.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : `
            <ul class="risk-list">
              <li>Het is nog niet bewezen dat gesprekskwaliteit met de tool verbetert</li>
              <li>Pilotevaluatie na 8-12 weken is de eerste echte toets</li>
            </ul>`}
          </div>
        </div>
      `;
    }

    // ---- Next Steps ----
    function renderNext() {
      const timeline = items("tijdlijnTeam");
      const metrics = items("succesMetrics");
      el("next").innerHTML = `
        <h2>Next Steps</h2>
        <p>Gebruik de feedback uit dit prototype om te bepalen wat straks in de kennislaag en de live chatapp hoort.</p>
        <div class="roadmap">
          <article>
            <h3>Kennislaag cureren</h3>
            <p>Stel samen met domeinexperts de definitieve bronnen vast. Annoteer elke bron op doelgroep (leeftijd, geslacht). Sluit de open besluiten over OB-03 af.</p>
          </article>
          <article>
            <h3>Privacy-toets DPO</h3>
            <p>Laat DPO of juridisch adviseur de AVG-conformiteit bevestigen vóór de pilot start. Kies het hostingplatform (OB-01) op basis van dit advies.</p>
          </article>
          <article>
            <h3>Pilot 5–10 coaches (week 7–10)</h3>
            <p>Test de tool met echte coachingvragen. Meet adoptie, gesprekskwaliteit en vertrouwen. Let op signalen van over-afhankelijkheid en hallucinaties die coaches overnemen.</p>
          </article>
          <article>
            <h3>Evaluatie & besluit Fase 2</h3>
            <p>Bepaal op basis van pilotresultaten of data-integratie (Niveau 2) toegevoegde waarde heeft. Pas de kennislaag aan op basis van bevindingen.</p>
          </article>
        </div>
        <h3 style="margin-top:20px">Tijdlijn</h3>
        ${timeline.length ? `<ul class="assumption-list">${timeline.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : ""}
        <h3 style="margin-top:16px">Succesmetingen</h3>
        ${metrics.length ? `<ul class="assumption-list">${metrics.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>` : ""}
        <div class="feedback-section">
          <h3>Feedback op dit prototype</h3>
          <p class="dark">${esc(model.feedbackPrompts[0])}</p>
          <div class="feedback-row" id="fb-row">
            ${["Ja, nuttig","Bijna","Nog niet"].map(v=>`<button data-fb="${v}" class="${state.feedback===v?"selected":""}">${v}</button>`).join("")}
          </div>
          <label for="fb-note">Wat moet er veranderen voordat dit naar een live app gaat?</label><br>
          <textarea id="fb-note" class="feedback-note">${esc(state.note)}</textarea>
          <div class="feedback-status" id="fb-status">${state.feedback?"Vastgelegd: "+esc(state.feedback):""}</div>
        </div>
      `;
      document.querySelectorAll("[data-fb]").forEach(btn => {
        btn.addEventListener("click", () => { state.feedback = btn.dataset.fb; renderNext(); });
      });
      el("fb-note").addEventListener("input", e => { state.note = e.target.value; });
    }

    // ---- Navigation ----
    function showView(id) {
      document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id===id));
      document.querySelectorAll("nav button").forEach(b => b.setAttribute("aria-pressed", String(b.dataset.view===id)));
      if (id==="challenge") renderChallenge();
      if (id==="assumptions") renderAssumptions();
      if (id==="demo") renderDemo();
      if (id==="risks") renderRisks();
      if (id==="next") renderNext();
    }

    document.querySelectorAll("nav button").forEach(btn => {
      btn.addEventListener("click", () => showView(btn.dataset.view));
    });

    renderShell();
    renderChallenge();
    renderAssumptions();
    renderDemo();
    renderRisks();
    renderNext();
  </script>
</body>
</html>
