interface:
  display_name: "Workshop HTML Prototype"
  short_description: "Create standalone HTML concept prototypes inside workshop repos"
  default_prompt: "Update generate_standalone_html.py or safe source inputs using the workshop use-case canvas, agent-docs, example-data, and legacy-code references. Generate user-facing output in Dutch by default. Use these default buttons in this exact order: `Uitdaging`, `Aannames`, `Interactieve Demo`, `Wat kan er misgaan?`, `Next Steps`. Make `Interactieve Demo` stand out, place `Bronnen` under a top-right options button with three horizontal lines, omit a prominent skill badge, then generate the result into build/ with a recognizable sequential filename and ask the user about theme colors, logos, and extra demo interaction."

workspace:
  preferred_output: "generate_standalone_html.py"
  read_first:
    - "README.md"
    - "GETTING_STARTED.md"
    - "agent-docs/"
  avoid:
    - "secret-data/"
    - ".venv/"
