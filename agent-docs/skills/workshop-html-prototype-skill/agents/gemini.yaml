interface:
  display_name: "Workshop HTML Prototype"
  short_description: "Create simple standalone HTML concept prototypes for AI workshop use cases"
  default_prompt: "Use the workshop HTML prototype structure to update the generator and create a shareable no-build concept demo in build/ with a recognizable sequential filename. Generate the UI in Dutch by default. Use these default buttons in this exact order: `Uitdaging`, `Aannames`, `Interactieve Demo`, `Wat kan er misgaan?`, `Next Steps`. Make `Interactieve Demo` stand out, place `Bronnen` under a top-right options button with three horizontal lines, omit a prominent skill badge, and ask the user about colors, logos, and extra demo interaction after the first version."

instructions:
  entrypoint: "SKILL.md"
  preferred_output: "generate_standalone_html.py"
